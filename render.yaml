services:
  - type: web
    name: chocodine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
